name: Release
on:
    push:
        tags:
            - "v*"
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
    release:
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "macos-latest"
                      args: "--target aarch64-apple-darwin"
                      arch: "aarch64"
                    - platform: "macos-latest"
                      args: "--target x86_64-apple-darwin"
                      arch: "x86_64"
                    - platform: "ubuntu-22.04"
                      args: ""
                      arch: "amd64"
                    - platform: "windows-latest"
                      args: ""
                      arch: "amd64"
        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4
            - name: Install Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - name: Install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
            - name: Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: ". -> target"
            - name: Install frontend dependencies
              run: deno i --npm --allow-scripts
            - name: Build y publicar release
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNIGN_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  NO_STRIP: true
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: "CubicLauncher ${{ github.ref_name }}"
                  releaseBody: |
                      ## Cambios en esta versión
                      Ver los commits para más detalles.
                  releaseDraft: false
                  prerelease: false
                  includeUpdaterJson: true
                  updaterJsonPreferNsis: true
                  args: ${{ matrix.args }}
